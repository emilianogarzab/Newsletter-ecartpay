name: Radar Semanal Ecart Pay

on:
  schedule:
    - cron: '0 12 * * 1'   # Lunes 12:00 UTC = 6:00 AM Monterrey (CST)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Compatibilidad Node.js 24

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar agente de noticias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
        run: python agent.py

      - name: Copiar reporte más reciente a docs/index.html
        run: |
          mkdir -p docs
          latest=$(ls -t reportes/reporte_*.html 2>/dev/null | head -1)
          if [ -z "$latest" ]; then
            echo "❌ No se generó ningún reporte en reportes/"
            exit 1
          fi
          cp "$latest" docs/index.html
          echo "✅ Publicando: $latest → docs/index.html"

      - name: Commit y push del reporte
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "reporte: radar semanal"
          file_pattern: reportes/ docs/
          commit_user_name: Ecart Pay Bot
          commit_user_email: actions@github.com
